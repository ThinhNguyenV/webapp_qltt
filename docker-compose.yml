services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: docsys_sqlserver
    restart: always
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=Root@1234
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - docsys_network

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: docsys_elasticsearch
    restart: always
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - docsys_network

networks:
  docsys_network:
    driver: bridge

volumes:
  sqlserver_data:
  es_data:
